name: Release On Tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch third-party dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Path "third_party" -Force | Out-Null

          function Invoke-GitCloneWithRetry {
            param(
              [Parameter(Mandatory = $true)][string]$Repo,
              [Parameter(Mandatory = $true)][string]$TargetDir,
              [int]$MaxAttempts = 3
            )

            for ($attempt = 1; $attempt -le $MaxAttempts; $attempt++) {
              Remove-Item -LiteralPath $TargetDir -Recurse -Force -ErrorAction SilentlyContinue
              git clone $Repo $TargetDir
              if ($LASTEXITCODE -eq 0) {
                return
              }
              if ($attempt -eq $MaxAttempts) {
                throw "git clone failed after $MaxAttempts attempts: $Repo -> $TargetDir"
              }
              Start-Sleep -Seconds (2 * $attempt)
            }
          }

          if (-not (Test-Path "third_party/ts3_sdk/include/ts3_functions.h")) {
            Invoke-GitCloneWithRetry -Repo "https://github.com/teamspeak/ts3client-pluginsdk.git" -TargetDir "third_party/ts3_sdk"
            git -C third_party/ts3_sdk checkout 4aa90a53aa150cbf81e13bc97e68c0431b26499f
          }

          if (-not (Test-Path "third_party/speexdsp/libspeexdsp/resample.c")) {
            Invoke-GitCloneWithRetry -Repo "https://github.com/xiph/speexdsp.git" -TargetDir "third_party/speexdsp"
            git -C third_party/speexdsp checkout 7a158783df74efe7c2d1c6ee8363c1e695c71226
          }

      - name: Resolve release metadata
        id: meta
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          $artifact = "dist/MicMix-$version-win64.ts3_plugin"
          $checksum = "$artifact.sha256"

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "artifact=$artifact" >> $env:GITHUB_OUTPUT
          "checksum=$checksum" >> $env:GITHUB_OUTPUT

      - name: Configure CMake
        shell: pwsh
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build (Release)
        shell: pwsh
        run: cmake --build build --config Release

      - name: Package TeamSpeak plugin
        shell: pwsh
        run: ./scripts/package_ts3_plugin.ps1 -Version "${{ steps.meta.outputs.version }}" -Configuration Release

      - name: Generate SHA256 file
        shell: pwsh
        run: |
          $artifact = "${{ steps.meta.outputs.artifact }}"
          if (-not (Test-Path $artifact)) {
            throw "Artifact not found: $artifact"
          }
          $hash = (Get-FileHash -LiteralPath $artifact -Algorithm SHA256).Hash
          $fileName = [System.IO.Path]::GetFileName($artifact)
          $line = "$hash  $fileName"
          Set-Content -LiteralPath "${{ steps.meta.outputs.checksum }}" -Value $line -Encoding ascii

      - name: Build release notes
        id: notes
        shell: pwsh
        run: |
          $version = "${{ steps.meta.outputs.version }}"
          $tag = "${{ steps.meta.outputs.tag }}"
          $notesPath = Join-Path $env:RUNNER_TEMP "release-notes.md"

          $body = "Automated release for $tag.`n`nIncluded assets:`n- MicMix-$version-win64.ts3_plugin`n- MicMix-$version-win64.ts3_plugin.sha256"

          if (Test-Path CHANGELOG.md) {
            $lines = Get-Content CHANGELOG.md
            $start = -1
            for ($i = 0; $i -lt $lines.Count; $i++) {
              if ($lines[$i] -match ("^## \[" + [regex]::Escape($version) + "\]")) {
                $start = $i
                break
              }
            }
            if ($start -ge 0) {
              if ($version -eq "1.2.2") {
                # 1.2.1 was skipped as an external release; publish cumulative notes.
                $body = ($lines[$start..($lines.Count - 1)] -join "`n")
              } else {
                $end = $lines.Count
                for ($j = $start + 1; $j -lt $lines.Count; $j++) {
                  if ($lines[$j] -match "^## \[") {
                    $end = $j
                    break
                  }
                }
                $body = ($lines[$start..($end - 1)] -join "`n")
              }
            }
          }

          Set-Content -LiteralPath $notesPath -Value $body -Encoding utf8
          "path=$notesPath" >> $env:GITHUB_OUTPUT

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: MicMix ${{ steps.meta.outputs.version }}
          body_path: ${{ steps.notes.outputs.path }}
          files: |
            ${{ steps.meta.outputs.artifact }}
            ${{ steps.meta.outputs.checksum }}
